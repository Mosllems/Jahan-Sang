{% extends 'base.html' %}
{% load static %}

{% block title %} خروج {% endblock title %}

{% block content %}
<main>
    <!-- breadcrumb area start -->
    <section class="breadcrumb-area">
        <div class="breadcrumb-area-inner">
            <div class="breadcrumb-bg">
                <img alt="image" src="{% static 'imgs/gallery/gallery-29.webp' %}" />
            </div>
            <div class="container rr-container-1410">
                <div class="breadcrumb-content">
                    <div class="title-wrapper">
                        <h1 class="breadcrumb-title">خروج از حساب</h1>
                    </div>
                    <div class="breadcrumb-wrapper">
                        <ul class="rr-breadcrumb">
                            <li><a href="{% url 'pages:home' %}">خانه</a></li>
                            <li>خروج</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- breadcrumb area end -->

    <section class="auth-area section-spacing">
        <div class="container rr-container-1410">
            <div class="auth-box">
                <h2 class="auth-title">خروج از حساب کاربری</h2>
                <p class="auth-subtitle">آیا مطمئن هستید که می‌خواهید خارج شوید؟</p>

                <form class="auth-form" method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                    {% endif %}
                    <button class="rr-btn auth-submit" type="submit">
                        <span class="btn-wrap">
                            <span class="text-one">خروج</span>
                            <span class="text-two">خروج</span>
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </section>
</main>
{% endblock content %}
